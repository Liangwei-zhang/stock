worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream app {
        server app:8000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS in production (uncomment when cert is ready)
        # return 301 https://$host$request_uri;

        client_max_body_size 20m;

        # Static uploads served directly by nginx
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Auth endpoints — strict rate limit
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://app;
            include /etc/nginx/proxy_params;
        }

        # WebSocket upgrade
        location /ws {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # All other API traffic
        location / {
            limit_req zone=api burst=200 nodelay;
            proxy_pass http://app;
            include /etc/nginx/proxy_params;
        }
    }

    # HTTPS server (uncomment and fill in your domain + cert paths)
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     include /etc/nginx/conf.d/*.conf;
    # }
}
